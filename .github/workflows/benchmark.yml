name: benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v6

      - run: ./gradlew benchmark | tee benchmark-output.txt

      - name: Find benchmark result JSON
        id: find-result
        run: echo "file=$(find build/reports/benchmarks -name '*.json' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Store benchmark result
        if: steps.find-result.outputs.file != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'jmh'
          output-file-path: ${{ steps.find-result.outputs.file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          benchmark-data-dir-path: dev/bench
          alert-comment-cc-users: '@${{ github.repository_owner }}'

      - name: Add benchmark summary
        if: always()
        run: |
          if grep -q "^Benchmark" benchmark-output.txt; then
            echo '## Benchmark Results' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '/^Benchmark/,/^$/p' benchmark-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
