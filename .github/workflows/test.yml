name: test & coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - run: ./gradlew test

      - run: ./gradlew koverXmlReport

      - run: ./gradlew koverVerify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/kover/

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f build/reports/kover/report.xml ]; then
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            LINE_MISSED=$(grep -oP '<counter type="LINE" missed="\K[0-9]+' build/reports/kover/report.xml | tail -1)
            LINE_COVERED=$(grep -oP '<counter type="LINE"[^/]*covered="\K[0-9]+' build/reports/kover/report.xml | tail -1)
            if [ -n "$LINE_MISSED" ] && [ -n "$LINE_COVERED" ]; then
              TOTAL=$((LINE_MISSED + LINE_COVERED))
              if [ "$TOTAL" -gt 0 ]; then
                PCT=$((LINE_COVERED * 100 / TOTAL))
                echo "Line coverage: **${PCT}%** (${LINE_COVERED}/${TOTAL})" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi
