name: ktfmt check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ktfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew ktfmtCheck
