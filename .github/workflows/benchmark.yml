name: benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - run: ./gradlew benchmark | tee benchmark-output.txt

      - name: Add benchmark summary
        if: always()
        run: |
          if grep -q "^Benchmark" benchmark-output.txt; then
            echo '## Benchmark Results' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '/^Benchmark/,/^$/p' benchmark-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
